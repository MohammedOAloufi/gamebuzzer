<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Buzzer | اللاعب</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container player-page-container">
      <div class="card player-join-card" id="joinView">
        <div class="card-header player-join-header">
          <h2 class="card-title">الانضمام إلى الجلسة</h2>
          <p class="card-desc">اختر اسمك وفريقك ثم اضغط انضمام</p>
        </div>

        <div class="card-content player-join-content">
          <div class="join-session-code-box">
            <div class="connected-label">كود الجلسة</div>
            <div class="connected-code join-session-code" id="deviceSessionCode">
              ------
            </div>
          </div>

          <div class="device-form player-join-form">
            <div class="field">
              <label for="deviceName">اسم اللاعب</label>
              <input
                class="input"
                id="deviceName"
                value="لاعب 1"
                maxlength="40"
                placeholder="اكتب اسمك"
              />
            </div>

            <div class="field">
              <label for="selectedTeam">اختر الفريق</label>
              <select class="select" id="selectedTeam"></select>
            </div>
          </div>

          <button class="btn join-player-btn" id="joinPlayerBtn">انضمام</button>
        </div>
      </div>

      <div class="card player-buzzer-card hidden" id="buzzerView">
        <div class="card-header player-buzzer-header">
          <div class="player-buzzer-top">
            <div>
              <h2 class="card-title">زر اللاعب</h2>
              <p class="card-desc">اضغط عند فتح الأزرار</p>
            </div>
            <span class="state-badge green" id="connectionBadge">متصل</span>
          </div>
        </div>

        <div class="card-content player-buzzer-content">
          <div class="player-main-layout">
            <div class="player-answer-time-box player-answer-large">
              <div class="player-answer-label">وقت الإجابة</div>
              <div class="player-answer-value">
                <span id="answerTimeBig">3</span>
                <span class="answer-time-unit"></span>
              </div>
            </div>

            <div class="player-side-stats">
              <div class="stat-box player-stat-box player-cooldown-box">
                <div class="stat-label">وقت المنع</div>
                <div class="stat-value">
                  <span id="cooldownTimeLeft">0</span> 
                </div>
              </div>

              <div class="player-small-stats-row">
                <div class="stat-box player-stat-box player-compact-stat">
                  <div class="stat-label">الفريق</div>
                  <div class="stat-value" id="deviceTeamName">-</div>
                </div>

                <div class="stat-box player-stat-box player-compact-stat player-points-box">
                  <div class="stat-label">نقاط الفريق</div>
                  <div class="stat-value" id="deviceTeamPoints">0</div>
                </div>
              </div>
            </div>
          </div>

          <div class="player-buzz-wrap">
            <button class="big-buzz player-main-buzz" id="deviceBuzzBtn">
              اضغط
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
