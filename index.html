<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Buzzer | الرئيسية</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container home-container">
      <section class="hero home-hero">
        <div class="hero-inner single-column home-hero-inner">
          <div class="home-hero-text">
            <h1>نظام <span>أزرار الفرق</span> التفاعلي</h1>
            <p>
              من هنا يمكنك إنشاء جلسة جديدة كمشرف، أو الدخول إلى جلسة موجودة
              كلاعب باستخدام كود الجلسة.
            </p>
          </div>

          <div class="card home-card home-widget">
            <div class="card-header">
              <h2 class="card-title">ابدأ الآن</h2>
              <p class="card-desc">
                اختر إنشاء جلسة جديدة أو الدخول إلى جلسة موجودة
              </p>
            </div>

            <div class="card-content">
              <div class="home-actions">
                <button class="btn home-main-btn" id="createSessionBtn">
                  إنشاء الجلسة
                </button>
              </div>

              <div class="separator"></div>

              <div class="field">
                <label for="joinCodeInput">أدخل كود الجلسة</label>
                <input
                  class="input"
                  id="joinCodeInput"
                  placeholder="مثال: AB12CD"
                  maxlength="10"
                />
              </div>

              <div class="home-actions">
                <button class="btn secondary home-main-btn" id="joinSessionBtn">
                  دخول إلى الجلسة
                </button>
              </div>

              <div class="top-note home-note" style="margin-top: 18px">
                عند إنشاء الجلسة سيتم تحويلك مباشرة إلى صفحة المشرف، وعند الدخول
                بالكود سيتم تحويلك إلى صفحة اللاعب.
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      function randomCode(length = 6) {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let code = "";
        for (let i = 0; i < length; i++) {
          code += chars[Math.floor(Math.random() * chars.length)];
        }
        return code;
      }

      const createSessionBtn = document.getElementById("createSessionBtn");
      const joinSessionBtn = document.getElementById("joinSessionBtn");
      const joinCodeInput = document.getElementById("joinCodeInput");

      createSessionBtn.addEventListener("click", () => {
        const code = randomCode();
        window.location.href = `host.html?session=${encodeURIComponent(code)}`;
      });

      joinSessionBtn.addEventListener("click", () => {
        const code = String(joinCodeInput.value || "")
          .trim()
          .toUpperCase();

        if (!code) {
          alert("اكتب كود الجلسة أولاً");
          joinCodeInput.focus();
          return;
        }

        window.location.href = `player.html?session=${encodeURIComponent(code)}`;
      });

      joinCodeInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") joinSessionBtn.click();
      });
    </script>
  </body>
</html>
