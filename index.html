<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Buzzer | الرئيسية</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container home-container">
      <section class="hero home-hero">
        <div class="hero-inner single-column home-hero-inner">
          <div class="home-hero-text">
            <h1>نظام <span>أزرار الفرق</span> التفاعلي</h1>
            <p>
              من هنا يمكنك إنشاء جلسة جديدة كمشرف، أو الدخول إلى جلسة موجودة
              كلاعب باستخدام كود الجلسة.
            </p>
          </div>

          <div class="card home-card home-widget">
            <div class="card-header">
              <h2 class="card-title">ابدأ الآن</h2>
              <p class="card-desc">
                اختر إنشاء جلسة جديدة أو الدخول إلى جلسة موجودة
              </p>
            </div>

            <div class="card-content">
              <div class="home-actions">
                <button class="btn home-main-btn" id="createSessionBtn">
                  إنشاء الجلسة
                </button>
              </div>

              <div class="separator"></div>

              <div class="field">
                <label for="joinCodeInput">أدخل كود الجلسة</label>
                <input
                  class="input"
                  id="joinCodeInput"
                  placeholder="مثال: ONTYMM"
                  maxlength="10"
                />
                <p class="join-error-message hidden" id="joinErrorMessage">
                  كود الجلسة غير صحيح أو الجلسة غير موجودة
                </p>
              </div>

              <div class="home-actions">
                <button class="btn secondary home-main-btn" id="joinSessionBtn">
                  دخول إلى الجلسة
                </button>
              </div>

              <div class="top-note home-note top-gap-18">
                <strong>Developed by Mohammed Aloufi</strong><br />
                <span class="developer-links">
                  <a
                    class="developer-link"
                    href="https://www.linkedin.com/in/mohammed-aloufi-48a5b8372/"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    LinkedIn
                  </a>
                  <span class="developer-separator">|</span>
                  <a
                    class="developer-link"
                    href="https://github.com/MohammedOAloufi"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    GitHub
                  </a>
                  <span class="developer-separator">|</span>
                  <a
                    class="developer-link"
                    href="mailto:MoAloufi2001@hotmail.com"
                  >
                    Email
                  </a>
                </span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
